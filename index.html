<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>비밀번호 난수 생성기</title>
  <style>
    :root {
      --panel: #ffffff;
      --text: #1d1d1b;
      --muted: #6c6c66;
      --line: #d8d8d0;
      --accent: #2cab79;
      --accent-deep: #218c63;
      --soft: #f2f5f1;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(44, 171, 121, 0.08), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, #f7f8f4 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      width: min(1040px, calc(100% - 32px));
      margin: 36px auto 48px;
      background: var(--panel);
      border: 1px solid rgba(29, 29, 27, 0.08);
      border-radius: 24px;
      box-shadow: 0 18px 46px rgba(29, 29, 27, 0.06);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      letter-spacing: -0.03em;
    }
    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      gap: 28px;
      grid-template-columns: minmax(320px, 420px) 1fr;
      align-items: start;
    }
    label,
    .group-title {
      display: block;
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
    }
    .field {
      margin-bottom: 20px;
    }
    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }
    input[type="text"],
    input[type="number"] {
      height: 48px;
    }
    textarea {
      min-height: 440px;
      max-height: 560px;
      padding: 16px 18px;
      overflow: auto;
      resize: vertical;
      white-space: pre-wrap;
      word-break: break-all;
      border-radius: 18px;
      background: var(--soft);
      font: 15px/1.7 "SF Mono", "Menlo", "Consolas", monospace;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .range-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 112px 1fr;
      align-items: center;
    }
    .toolbar,
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: #ecf7f1;
      color: var(--accent-deep);
    }
    .check-list {
      display: grid;
      gap: 12px;
    }
    .check {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-weight: 400;
      line-height: 1.45;
      margin: 0;
    }
    .check input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--accent);
    }
    .status {
      white-space: pre-wrap;
      margin-bottom: 12px;
      min-height: 24px;
      font-size: 14px;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>비밀번호 난수 생성기</h1>
    <p class="sub">길이, 문자 구성, 제외 규칙을 조절하고 한 번에 여러 개의 비밀번호를 생성할 수 있습니다.</p>
    <div class="grid">
      <form id="genForm">
        <div class="field">
          <label for="lengthNumber">비밀번호 길이</label>
          <div class="range-row">
            <input id="lengthNumber" name="length" type="number" min="4" max="64" value="16" />
            <input id="lengthRange" type="range" min="4" max="64" value="16" />
          </div>
        </div>
        <div class="field">
          <label for="countNumber">생성 개수</label>
          <input id="countNumber" name="count" type="number" min="1" max="10000" value="5" />
        </div>
        <div class="field">
          <div class="group-title">조건</div>
          <div class="check-list">
            <label class="check">
              <input type="checkbox" name="include_symbols" /><span>기호 포함 (예: _-#*+)</span>
            </label>
            <label class="check">
              <input type="checkbox" name="include_numbers" checked /><span>숫자 포함 (e.g. 123456)</span>
            </label>
            <label class="check">
              <input type="checkbox" name="include_lowercase" checked /><span>소문자 포함 (예: abcdef)</span>
            </label>
            <label class="check">
              <input type="checkbox" name="include_uppercase" checked /><span>대문자 포함 (예: ABCDEF)</span>
            </label>
            <label class="check">
              <input type="checkbox" name="exclude_similar" checked /><span>유사 문자 제외하기 (예: o,O,0,i,I,l,1,L)</span>
            </label>
            <label class="check">
              <input type="checkbox" name="exclude_ambiguous" /><span>애매한 문자 제외 (예: ,.;:'`~\()/{}[])</span>
            </label>
          </div>
        </div>
        <div class="field actions">
          <button type="button" id="btnGenerate">생성</button>
          <button type="button" id="btnClear" class="secondary">결과 비우기</button>
        </div>
        <div class="hint">같은 한 번의 생성 요청 안에서는 중복 없이 뽑습니다. 1만 개까지 생성할 수 있습니다.</div>
      </form>

      <section>
        <div class="group-title">생성 결과</div>
        <div class="status" id="statusBox" style="color:#555555">아직 생성된 비밀번호가 없습니다.</div>
        <textarea id="resultBox" readonly>생성된 비밀번호가 줄바꿈으로 여기에 표시됩니다.</textarea>
        <div class="toolbar" style="margin-top:10px;">
          <button type="button" id="copyAll" class="secondary">전체 복사 (엑셀용)</button>
        </div>
      </section>
    </div>
  </div>
  <script>
    const LENGTH_MIN = 4, LENGTH_MAX = 64, COUNT_MAX = 10000;
    const SIMILAR_CHARS = new Set("oO0iIl1L");
    const AMBIGUOUS_CHARS = new Set(",.;:'`~\"\\/(){}[]");
    const GROUPS = {
      numbers: "0123456789",
      lowercase: "abcdefghijklmnopqrstuvwxyz",
      uppercase: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      symbols: "!@#$%^&*-_=+?"
    };

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function secureRandomIndex(max) {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return arr[0] % max;
    }

    function secureChoice(str) {
      return str[secureRandomIndex(str.length)];
    }

    function fisherYatesShuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = secureRandomIndex(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function filterChars(source, excludeSimilar, excludeAmbiguous) {
      let result = "";
      for (const ch of source) {
        if (excludeSimilar && SIMILAR_CHARS.has(ch)) continue;
        if (excludeAmbiguous && AMBIGUOUS_CHARS.has(ch)) continue;
        result += ch;
      }
      return result;
    }

    function countValidPasswords(groupSizes, length) {
      if (length > 18) return Infinity;

      const totalSize = groupSizes.reduce((a, b) => a + b, 0);
      if (totalSize === 0) return 0;

      let total = 0n;
      const subsetCount = 1 << groupSizes.length;
      for (let mask = 0; mask < subsetCount; mask++) {
        let removed = 0;
        let bits = 0;
        for (let i = 0; i < groupSizes.length; i++) {
          if (mask & (1 << i)) {
            removed += groupSizes[i];
            bits++;
          }
        }
        const available = totalSize - removed;
        if (available <= 0) continue;
        const term = BigInt(available) ** BigInt(length);
        total += bits % 2 === 0 ? term : -term;
      }
      return Number(total);
    }

    function buildPasswords(options) {
      const selectedGroups = [];
      if (options.includeNumbers)
        selectedGroups.push(filterChars(GROUPS.numbers, options.excludeSimilar, options.excludeAmbiguous));
      if (options.includeLowercase)
        selectedGroups.push(filterChars(GROUPS.lowercase, options.excludeSimilar, options.excludeAmbiguous));
      if (options.includeUppercase)
        selectedGroups.push(filterChars(GROUPS.uppercase, options.excludeSimilar, options.excludeAmbiguous));
      if (options.includeSymbols)
        selectedGroups.push(filterChars(GROUPS.symbols, options.excludeSimilar, options.excludeAmbiguous));

      if (selectedGroups.length === 0)
        throw new Error("최소 한 가지 문자 종류를 선택해주세요.");
      if (selectedGroups.some(g => g.length === 0))
        throw new Error("제외 규칙 때문에 사용할 수 없는 문자군이 생겼습니다. 옵션을 조정해주세요.");

      const length = options.length;
      const count = options.count;

      if (length < selectedGroups.length)
        throw new Error("현재 조건을 모두 포함하려면 길이가 더 길어야 합니다.");

      const combinations = countValidPasswords(selectedGroups.map(g => g.length), length);
      if (combinations < count)
        throw new Error("현재 조건으로 만들 수 있는 경우의 수보다 요청 개수가 많습니다. 길이를 늘리거나 조건을 넓혀주세요.");

      const pool = selectedGroups.join("");
      const results = new Set();

      while (results.size < count) {
        const chars = selectedGroups.map(g => secureChoice(g));
        while (chars.length < length) {
          chars.push(secureChoice(pool));
        }
        fisherYatesShuffle(chars);
        results.add(chars.join(""));
      }

      return [...results];
    }

    function readOptions() {
      const form = document.getElementById("genForm");
      return {
        length: clamp(parseInt(form.length.value, 10) || 16, LENGTH_MIN, LENGTH_MAX),
        count: clamp(parseInt(form.count.value, 10) || 5, 1, COUNT_MAX),
        includeSymbols: form.include_symbols.checked,
        includeNumbers: form.include_numbers.checked,
        includeLowercase: form.include_lowercase.checked,
        includeUppercase: form.include_uppercase.checked,
        excludeSimilar: form.exclude_similar.checked,
        excludeAmbiguous: form.exclude_ambiguous.checked
      };
    }

    const statusBox = document.getElementById("statusBox");
    const resultBox = document.getElementById("resultBox");

    document.getElementById("btnGenerate").addEventListener("click", () => {
      const options = readOptions();
      try {
        const passwords = buildPasswords(options);
        resultBox.value = passwords.join("\n");
        statusBox.style.color = "#555555";
        statusBox.textContent = `${passwords.length}개의 비밀번호를 생성했습니다.`;
      } catch (e) {
        statusBox.style.color = "#b42318";
        statusBox.textContent = e.message;
      }
    });

    document.getElementById("btnClear").addEventListener("click", () => {
      resultBox.value = "생성된 비밀번호가 줄바꿈으로 여기에 표시됩니다.";
      statusBox.style.color = "#555555";
      statusBox.textContent = "결과를 비웠습니다.";
    });

    document.getElementById("copyAll").addEventListener("click", async () => {
      const text = resultBox.value;
      if (!text || text.includes("생성된 비밀번호가 줄바꿈으로 여기에 표시됩니다.")) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        console.error(error);
      }
    });

    const lengthNumber = document.getElementById("lengthNumber");
    const lengthRange = document.getElementById("lengthRange");
    lengthRange.addEventListener("input", () => {
      lengthNumber.value = lengthRange.value;
    });
    lengthNumber.addEventListener("input", () => {
      lengthRange.value = lengthNumber.value;
    });
  </script>
</body>
</html>
